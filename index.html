<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studyo</title>
    <style>
        :root {
            --primary: #BF092F; 
            --bg: #1a1a1a;
            --sidebar-bg: #252525;
            --text: #ffffff;
            --msg-bg: #333;
            --danger: #ff5555;
            --admin-color: #00d4ff;
            --warning: #ffaa00;
        }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;
            position: relative;
        }

        /* LOGIN */
        #loginPage { text-align: center; background: var(--sidebar-bg); padding: 40px; border-radius: 20px; width: 320px; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }

        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: var(--primary); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; user-select: none; }
        button:hover:not(:disabled) { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .text-btn { background: none; border: none; color: #aaa; font-size: 12px; margin-top: 15px; text-decoration: underline; padding: 0; width: auto; font-weight: normal; }
        .text-btn:hover { color: white; background: none; }

        /* APP LAYOUT */
        #app { display: none; width: 100vw; height: 100vh; flex-direction: row; }
        
        #sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; overflow-y: auto;}
        .sidebar-btn { background: #333; color: white; margin-bottom: 10px; text-align: left; padding: 12px; width: 100%; border:none; border-radius:8px; cursor:pointer;}
        .sidebar-btn:hover { background: #444; }

        .list-title { font-size: 11px; color: var(--primary); letter-spacing: 1px; margin: 20px 0 10px 5px; text-transform: uppercase; }
        
        /* PREFERENCES CONTROLS */
        .pref-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
        #themeColor { width: 40px; height: 40px; padding: 0; border: none; border-radius: 8px; cursor: pointer; background: transparent; }
        #themeColor::-webkit-color-swatch-wrapper { padding: 0; }
        #themeColor::-webkit-color-swatch { border: 1px solid #444; border-radius: 8px; }
        .reset-btn { background: #444; color: white; margin: 0; padding: 10px; flex: 1; font-size: 13px; }

        .user-item { 
            padding: 10px; margin-bottom: 5px; background: #2a2a2a; border-radius: 8px; cursor: pointer; 
            display: flex; flex-direction: column; transition: 0.2s; font-size: 14px;
        }
        .user-item-header { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .user-item-controls { display: flex; gap: 4px; margin-top: 6px; justify-content: flex-end; flex-wrap: wrap;}
        
        .user-item:hover { background: #333; }
        .active-chat { border-left: 4px solid var(--primary); background: #333 !important; }
        .blocked-user { opacity: 0.5; }

        /* UNREAD & ONLINE DOTS */
        .unread-dot {
            display: inline-block; width: 10px; height: 10px;
            background: var(--danger); border-radius: 50%;
            margin-left: 8px; box-shadow: 0 0 5px var(--danger);
        }

        .online-dot {
            display: inline-block; width: 8px; height: 8px;
            background: #44bb44; border-radius: 50%;
            margin-left: 5px; box-shadow: 0 0 5px #44bb44;
            vertical-align: middle;
        }

        /* MODERATION & USER CONTROLS */
        .mod-btn { font-size: 10px; padding: 4px 8px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; width: auto; margin: 0; }
        .ban-btn { background: var(--danger); color: white; }
        .unban-btn { background: #44bb44; color: white; }
        .del-user-btn { background: #aa0000; color: white; }
        .block-btn { background: #666; color: white; }
        .kick-btn { background: var(--warning); color: black; }

        /* CHAT AREA */
        #chat { flex: 1; display: flex; flex-direction: column; background: #111; position: relative; }
        #top { padding: 15px 25px; background: #222; border-bottom: 1px solid #333; font-weight: bold; color: var(--primary); display: flex; justify-content: space-between; align-items: center;}
        
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; list-style: none; margin: 0; }
        
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 12px; background: var(--msg-bg); position: relative; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; animation: fadeIn 0.2s ease-in;}
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg.me { align-self: flex-end; background: var(--primary); color: #fff; }
        .msg-text { word-break: break-word; flex: 1; }
        .msg-info { display: block; font-size: 10px; opacity: 0.6; margin-bottom: 4px; font-weight: bold; color: #ccc; }
        .msg.me .msg-info { color: #f0f0f0; } 
        .timestamp { font-size: 9px; margin-left: 8px; font-weight: normal; opacity: 0.7; }

        .del-btn { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 14px; padding: 0; width: auto; margin: 0; opacity: 0.4; }
        .del-btn:hover { opacity: 1; }

        /* STATUS CIRCLES */
        .status-text { align-self: flex-end; font-size: 11px; color: #888; margin-top: -6px; margin-bottom: 4px; margin-right: 5px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .status-circle { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
        .circle-delivered { border: 2px solid #888; background: transparent; box-sizing: border-box; }
        .circle-seen { background: #44bb44; box-shadow: 0 0 5px #44bb44; }

        /* TYPING INDICATOR */
        #typingIndicator { padding: 5px 25px; font-size: 11px; color: #888; font-style: italic; min-height: 15px; background: #111; }

        #sendBar { padding: 20px; display: flex; gap: 10px; background: #222; border-top: 1px solid #333; }
        
        #adminTools { background: #1a1a1a; padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px solid #444; display:flex; flex-direction:column; gap:5px; }
    </style>
</head>
<body>

<div id="loginPage">
    <h2 style="color:var(--primary)"> TUFF MESSAGING SITE</h2>
    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password">
    <button id="loginBtn" onclick="auth('login')">Login</button>
    <button id="signupBtn" style="background:#444; color:white" onclick="auth('signup')">Sign Up</button>
    <div id="kickMessage" style="color:var(--warning); margin-top:15px; font-weight:bold; font-size:14px;"></div>
    <button class="text-btn" onclick="requestPasswordReset()">Forgot Password?</button>
</div>

<div id="app">
    <div id="sidebar">
        <h3 id="myUserDisplay" style="color:var(--primary); margin-top:0"> Grape</h3>
        
        <button class="sidebar-btn" onclick="openGlobalChat()" id="globalChatBtn">🌍 Global Chat</button>

        <div class="list-title">Direct Messages</div>
        <div id="userList" style="flex:1; overflow-y:auto; min-height:100px;"></div>

        <div class="list-title">Preferences</div>
        <div class="pref-row">
            <input type="color" id="themeColor" title="Change Theme Color">
            <button class="reset-btn" onclick="resetColor()">Reset Color</button>
        </div>

        <div id="adminPanel" class="hidden">
            <div class="list-title">Admin Tools</div>
            <div id="adminTools">
                <button onclick="clearAllStuckTyping()" style="font-size:11px; padding:8px; background:var(--warning); color:black;">Clear Stuck Typing</button>
                <button onclick="wipeAllChatsLive()" style="font-size:11px; padding:8px; background:var(--danger); color:white; margin-top:5px;">Delete All Chats Live</button>
            </div>
        </div>
        
        <button onclick="changePassword()" style="background:#444; color:white; margin-top:15px; font-size: 14px;">Change Password</button>
        <button onclick="logoutUser()" style="background:var(--danger); margin-top:10px; font-size: 14px;">Logout</button>
    </div>

    <div id="chat">
        <div id="top">
            <span id="chatTitle">Select a user to chat</span>
        </div>
        <ul id="messages"></ul>
        
        <div id="typingIndicator" class="hidden"></div>

        <div id="sendBar">
            <input id="msgInput" placeholder="Type a message...">
            <button onclick="send()" style="width:80px; margin:0">Send</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB7wjLsAU5XrHhXgXvLblURv8i_5ViBHGE",
        authDomain: "bananamessagingsite.firebaseapp.com",
        databaseURL: "https://bananamessagingsite-default-rtdb.firebaseio.com",
        projectId: "bananamessagingsite",
        storageBucket: "bananamessagingsite.firebasestorage.app",
        messagingSenderId: "540607876740",
        appId: "1:540607876740:web:99505bf5d4e6b665897cd1",
        measurementId: "G-LTKZKNTPWK"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const ADMIN_USER = "banana777";
    let currentUser = null;
    let currentPath = null;
    let activeChatPath = null; 
    let typingTimeout = null; 
    let loginTimerInterval = null;
    
    let lastSentTime = 0;
    const COOLDOWN_MS = 900;
    const BAD_WORDS = ["fuck", "shit", "67", "epstein", "diddy", "bitch"]; 
    
    let myBlockedUsers = {}; 
    let myUnreadUsers = {};
    let allUsersSnap = null;
    let currentMessages = [];
    let roomReadReceipts = {};

    // --- AUTH & KICK LOGIC ---
    async function auth(type) {
        const u = document.getElementById('u').value.trim().toLowerCase();
        const p = document.getElementById('p').value.trim();
        if(!u || !p) return alert("Fill everything in!");

        if (type === 'signup') {
            if (localStorage.getItem('tuff_account_created') && u !== ADMIN_USER) {
                return alert("You can only create one account per computer!");
            }
        }

        const fakeEmail = u + "@bananachat.com";

        try {
            if(type === 'signup') {
                await firebase.auth().createUserWithEmailAndPassword(fakeEmail, p);
                await db.ref("users/" + u).set({ banned: false, online: true });
                localStorage.setItem('tuff_account_created', 'true');
                checkKickStatusAndStart(u);
            } else {
                await firebase.auth().signInWithEmailAndPassword(fakeEmail, p);
                checkKickStatusAndStart(u);
            }
        } catch (error) {
            let cleanMessage = "Something went wrong. Please try again.";
            switch(error.code) {
                case 'auth/wrong-password':
                case 'auth/invalid-credential':
                case 'auth/invalid-login-credentials': cleanMessage = "Incorrect password! Please try again."; break;
                case 'auth/user-not-found': cleanMessage = "User not found. Please sign up first!"; break;
                case 'auth/email-already-in-use': cleanMessage = "That username is already taken! Try another one."; break;
                case 'auth/weak-password': cleanMessage = "Your password is too weak. Make it at least 6 characters."; break;
                default: cleanMessage = "Error: " + error.message; 
            }
            alert(cleanMessage);
        }
    }

    function checkKickStatusAndStart(user) {
        db.ref("users/" + user).once("value", snap => {
            const data = snap.val() || {};
            if (data.kickUntil && data.kickUntil > Date.now()) {
                firebase.auth().signOut();
                showKickTimer(data.kickUntil);
            } else {
                start(user);
            }
        });
    }

    function showKickTimer(timestamp) {
        document.getElementById('app').style.display = 'none';
        document.getElementById('loginPage').classList.remove('hidden');
        
        const loginBtn = document.getElementById("loginBtn");
        const signupBtn = document.getElementById("signupBtn");
        const msgDiv = document.getElementById("kickMessage");
        
        loginBtn.disabled = true;
        signupBtn.disabled = true;
        
        if(loginTimerInterval) clearInterval(loginTimerInterval);
        
        loginTimerInterval = setInterval(() => {
            const remaining = Math.ceil((timestamp - Date.now()) / 1000);
            if (remaining <= 0) {
                clearInterval(loginTimerInterval);
                msgDiv.innerText = "";
                loginBtn.disabled = false;
                signupBtn.disabled = false;
            } else {
                msgDiv.innerText = `You have been kicked.\nWait ${remaining}s before logging in.`;
            }
        }, 1000);
    }

    function requestPasswordReset() {
        const u = prompt("Enter your exact username. The admin will be notified that you forgot your password:");
        if (u) {
            db.ref("adminNotifications").push({
                type: 'forgot_password',
                user: u.trim().toLowerCase(),
                time: Date.now()
            });
            alert("Admin has been notified! Wait for them to contact you or clear your account.");
        }
    }

    // --- MAIN APP INITIALIZATION ---
    function start(user) {
        currentUser = user;
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('app').style.display = 'flex';
        document.getElementById('myUserDisplay').innerText = (currentUser === ADMIN_USER ? "👑 " : "👤 ") + currentUser;
        
        if(currentUser === ADMIN_USER) {
            document.getElementById('adminPanel').classList.remove('hidden');
            
            // Listen for Password Requests
            db.ref("adminNotifications").on("child_added", snap => {
                const req = snap.val();
                if (req && req.time > Date.now() - 300000) { 
                    alert(`🚨 ADMIN ALERT: User '${req.user}' forgot their password. Delete their account in Firebase Authentication so they can remake it.`);
                }
            });
        }

        db.ref("users/" + currentUser + "/themeColor").on("value", snap => {
            const savedColor = snap.val() || "#BF092F";
            document.documentElement.style.setProperty('--primary', savedColor);
            document.getElementById('themeColor').value = savedColor;
        });

        document.getElementById('themeColor').addEventListener('input', (e) => {
            const color = e.target.value;
            document.documentElement.style.setProperty('--primary', color);
            db.ref("users/" + currentUser + "/themeColor").set(color);
        });

        const connectedRef = db.ref(".info/connected");
        const myOnlineRef = db.ref("users/" + currentUser + "/online");
        
        connectedRef.on("value", (snap) => {
            if (snap.val() === true) {
                myOnlineRef.onDisconnect().set(false).then(() => {
                    myOnlineRef.set(true);
                });
            }
        });

        db.ref("users/" + currentUser).on("value", snap => {
            if(!snap.exists()) {
                alert("Your account data has been deleted by an admin.");
                location.reload();
            } else {
                const data = snap.val();
                if(data.banned === true) {
                    alert("You've been banned!");
                    location.reload();
                } else if (data.kickUntil && data.kickUntil > Date.now()) {
                    myOnlineRef.set(false).then(() => {
                        firebase.auth().signOut();
                        showKickTimer(data.kickUntil);
                    });
                }
            }
        });

        db.ref("users/" + currentUser + "/blocked").on("value", snap => {
            myBlockedUsers = snap.val() || {};
            renderUserList(); 
            renderChatUI(); 
        });

        db.ref("users/" + currentUser + "/unread").on("value", snap => {
            myUnreadUsers = snap.val() || {};
            renderUserList();
        });

        loadUsers();
    }

    // --- PREFERENCES & ADMIN UTILS ---
    function resetColor() {
        const defaultColor = "#BF092F";
        document.getElementById('themeColor').value = defaultColor;
        document.documentElement.style.setProperty('--primary', defaultColor);
        db.ref("users/" + currentUser + "/themeColor").remove();
    }

    function clearAllStuckTyping() {
        if(confirm("Clear all typing indicators from the database?")) {
            db.ref("typing").remove().then(() => alert("Stuck typing cleared!"));
        }
    }

    function logoutUser() {
        if(currentUser) {
            db.ref("users/" + currentUser + "/online").set(false).then(() => {
                firebase.auth().signOut().then(() => location.reload());
            });
        } else {
            location.reload();
        }
    }

    async function changePassword() {
        if(!currentUser) return;
        const newPass = prompt("Enter your new password (must be at least 6 characters):");
        if(newPass && newPass.trim().length >= 6) {
            try {
                const user = firebase.auth().currentUser;
                await user.updatePassword(newPass.trim());
                alert("Password successfully changed!");
            } catch(error) {
                alert("Error changing password: " + error.message);
            }
        } else if (newPass !== null) {
            alert("Password must be at least 6 characters long.");
        }
    }

    // --- SIDEBAR & NAVIGATION ---
    function loadUsers() {
        db.ref("users").on("value", snap => {
            allUsersSnap = snap;
            renderUserList();
        });
    }

    function renderUserList() {
        if(!allUsersSnap) return;
        const list = document.getElementById('userList');
        list.innerHTML = "";
        
        allUsersSnap.forEach(child => {
            if(child.key === currentUser) return;
            
            const userData = child.val();
            const isBlocked = myBlockedUsers[child.key];
            
            const expectedChatPath = "dm/" + [currentUser, child.key].sort().join("_");
            const isCurrentChat = (currentPath === expectedChatPath);
            const hasUnread = myUnreadUsers[child.key] && !isCurrentChat;
            
            const div = document.createElement('div');
            div.className = `user-item ${isBlocked ? 'blocked-user' : ''}`;
            div.id = "user-" + child.key;
            
            let adminControls = "";
            if(currentUser === ADMIN_USER) {
                let banBtn = userData.banned ? 
                    `<button class="mod-btn unban-btn" onclick="toggleBan('${child.key}', false); event.stopPropagation();">Unban</button>` :
                    `<button class="mod-btn ban-btn" onclick="toggleBan('${child.key}', true); event.stopPropagation();">Ban</button>`;
                
                let kickBtn = `<button class="mod-btn kick-btn" onclick="kickUser('${child.key}'); event.stopPropagation();">Kick</button>`;
                let delBtn = `<button class="mod-btn del-user-btn" onclick="deleteUser('${child.key}'); event.stopPropagation();">Delete</button>`;
                adminControls = banBtn + kickBtn + delBtn;
            }

            let blockBtn = `<button class="mod-btn block-btn" onclick="toggleBlock('${child.key}', ${!isBlocked}); event.stopPropagation();">${isBlocked ? 'Unblock' : 'Block'}</button>`;
            
            let unreadDot = hasUnread ? `<span class="unread-dot"></span>` : "";
            let onlineDot = userData.online ? `<span class="online-dot" title="Online"></span>` : "";

            div.innerHTML = `
                <div class="user-item-header" onclick="openDM('${child.key}')">
                    <span>👤 ${child.key} ${onlineDot} ${userData.banned ? '🚫' : ''} ${isBlocked ? '🔇' : ''} ${unreadDot}</span>
                </div>
                <div class="user-item-controls">
                    ${blockBtn}
                    ${adminControls}
                </div>
            `;
            list.appendChild(div);
        });
        
        if(currentPath && currentPath.startsWith("dm/")) {
            uiHighlight("user-" + currentPath.split("dm/")[1].split("_").find(u => u !== currentUser));
        }
    }

    function toggleBlock(targetUser, status) {
        if(status) db.ref("users/" + currentUser + "/blocked/" + targetUser).set(true);
        else db.ref("users/" + currentUser + "/blocked/" + targetUser).remove();
    }

    function toggleBan(targetUser, status) {
        if(confirm(`${status ? 'Ban' : 'Unban'} ${targetUser}?`)) {
            db.ref("users/" + targetUser + "/banned").set(status);
        }
    }

    function kickUser(targetUser) {
        const seconds = prompt(`How many seconds should ${targetUser} be kicked for?`, "60");
        if(seconds && !isNaN(seconds)) {
            const kickUntil = Date.now() + (parseInt(seconds) * 1000);
            db.ref("users/" + targetUser + "/kickUntil").set(kickUntil);
            alert(`${targetUser} kicked for ${seconds} seconds.`);
        }
    }

    function deleteUser(targetUser) {
        if(confirm(`Completely DELETE the database profile for ${targetUser}? (Note: Fully deleting their Auth credentials must be done in the Firebase Console)`)) {
            db.ref("users/" + targetUser).remove();
        }
    }

    function clearMyTypingState() {
        if(currentPath && currentUser) {
            db.ref("typing/" + currentPath + "/" + currentUser).remove();
        }
        if(typingTimeout) clearTimeout(typingTimeout);
    }

    // --- GLOBAL CHAT ---
    function openGlobalChat() {
        clearMyTypingState(); 
        currentPath = "global";
        document.getElementById('chatTitle').innerText = "🌍 Global Chat";
        uiHighlight("globalChatBtn");
        loadMessages();
    }

    function openDM(targetUser) {
        if(myBlockedUsers[targetUser]) {
            alert("You have blocked this user. Unblock them to send a DM.");
            return;
        }
        clearMyTypingState(); 
        const roomID = [currentUser, targetUser].sort().join("_");
        currentPath = "dm/" + roomID;
        document.getElementById('chatTitle').innerText = "💬 " + targetUser;
        uiHighlight("user-" + targetUser);
        loadMessages();
    }

    function uiHighlight(id) {
        document.querySelectorAll('.user-item, .sidebar-btn').forEach(el => el.classList.remove('active-chat'));
        if(id && document.getElementById(id)) document.getElementById(id).classList.add('active-chat');
    }

    // --- MESSAGING & READ RECEIPTS ---
    function cleanText(text) {
        let clean = text;
        BAD_WORDS.forEach(word => {
            const regex = new RegExp(word, "gi");
            clean = clean.replace(regex, "****");
        });
        return clean;
    }

    function loadMessages() {
        if (activeChatPath) {
            db.ref("messages/" + activeChatPath).off();
            db.ref("readReceipts/" + activeChatPath).off();
            db.ref("typing/" + activeChatPath).off(); 
        }
        activeChatPath = currentPath;
        
        if(currentPath && currentPath.startsWith("dm/")) {
            const targetUser = currentPath.split("dm/")[1].split("_").find(u => u !== currentUser);
            db.ref("users/" + currentUser + "/unread/" + targetUser).remove();

            db.ref("readReceipts/" + currentPath).on("value", snap => {
                roomReadReceipts = snap.val() || {};
                renderChatUI();
            });
        } else {
            roomReadReceipts = {};
        }

        db.ref("typing/" + currentPath).on("value", snap => {
            const typingData = snap.val() || {};
            const indicator = document.getElementById('typingIndicator');
            
            const typingUsers = Object.keys(typingData).filter(u => u !== currentUser && typingData[u] === true);
            
            if (typingUsers.length > 0) {
                indicator.innerText = typingUsers.length === 1 
                    ? `💬 ${typingUsers[0]} is typing...` 
                    : `💬 Multiple people are typing...`;
                indicator.classList.remove('hidden');
            } else {
                indicator.classList.add('hidden');
                indicator.innerText = "";
            }
        });

        db.ref("messages/" + currentPath).on("value", snap => {
            currentMessages = [];
            let lastMsgId = ""; 
            
            snap.forEach(child => {
                let msg = { id: child.key, ...child.val() };
                currentMessages.push(msg);
                lastMsgId = msg.id; 
            });

            if(currentPath && currentPath.startsWith("dm/")) {
                const targetUser = currentPath.split("dm/")[1].split("_").find(u => u !== currentUser);
                
                if (lastMsgId) {
                    db.ref("readReceipts/" + currentPath + "/" + currentUser).set(lastMsgId);
                }
                db.ref("users/" + currentUser + "/unread/" + targetUser).remove();
            }

            renderChatUI();
        });
    }

    function renderChatUI() {
        const list = document.getElementById('messages');
        if (!list) return;
        list.innerHTML = "";
        
        let otherUser = null;
        if (currentPath && currentPath.startsWith("dm/")) {
            otherUser = currentPath.split("dm/")[1].split("_").find(u => u !== currentUser);
        }

        currentMessages.forEach((msg, index) => {
            const isMe = msg.user === currentUser;
            const li = document.createElement('li');
            li.className = `msg ${isMe ? 'me' : ''}`;
            
            let timeString = new Date(msg.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            let delBtn = (isMe || currentUser === ADMIN_USER) 
                ? `<button class="del-btn" onclick="deleteMsg('${msg.id}')">🗑️</button>` 
                : "";

            li.innerHTML = `
                <div class="msg-text">
                    <span class="msg-info">${isMe ? "" : msg.user} <span class="timestamp">${timeString}</span></span>
                    ${msg.text}
                </div>
                ${delBtn}
            `;
            list.appendChild(li);

            if (isMe && currentPath.startsWith("dm/")) {
                let isLastSentByMe = true;
                for (let i = index + 1; i < currentMessages.length; i++) {
                    if (currentMessages[i].user === currentUser) {
                        isLastSentByMe = false;
                        break;
                    }
                }

                if (isLastSentByMe) {
                    const statusDiv = document.createElement('div');
                    statusDiv.className = "status-text";
                    
                    const theirReceiptId = roomReadReceipts[otherUser];
                    
                    if (theirReceiptId && msg.id <= theirReceiptId) {
                        statusDiv.innerHTML = `Seen <span class="status-circle circle-seen"></span>`;
                    } else {
                        statusDiv.innerHTML = `Delivered <span class="status-circle circle-delivered"></span>`;
                    }
                    list.appendChild(statusDiv);
                }
            }
        });

        list.scrollTop = list.scrollHeight;
    }

    document.getElementById('msgInput').addEventListener('input', (e) => {
        if (!currentPath) return;

        if(e.target.value.trim() === "") {
            db.ref("typing/" + currentPath + "/" + currentUser).remove();
            return;
        }

        db.ref("typing/" + currentPath + "/" + currentUser).set(true);

        if (typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            db.ref("typing/" + currentPath + "/" + currentUser).remove();
        }, 1500);
    });

    function send() {
        if(!currentPath) return alert("Please select a user or global chat first!");

        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if(!text) return;

        const now = Date.now();
        if(now - lastSentTime < COOLDOWN_MS) {
            alert("Slow down! Chill for a second.");
            return;
        }

        const filteredText = cleanText(text);

        db.ref("messages/" + currentPath).push({
            user: currentUser,
            text: filteredText,
            time: now
        });

        clearMyTypingState();

        if(currentPath.startsWith("dm/")) {
            const targetUser = currentPath.split("dm/")[1].split("_").find(u => u !== currentUser);
            db.ref("users/" + targetUser + "/unread/" + currentUser).set(true);
        }
        
        lastSentTime = now;
        input.value = "";
    }

    function deleteMsg(msgID) {
        db.ref("messages/" + currentPath + "/" + msgID).remove();
    }

    async function wipeAllChatsLive() {
        if(confirm("🚨 WARNING: Delete ALL messages across ALL chats?")) {
            try {
                await db.ref("messages").remove();
                await db.ref("readReceipts").remove();
                alert("All chats have been successfully deleted.");
            } catch (error) {
                alert("Wipe failed! Check your Firebase Database Rules: " + error.message);
            }
        }
    }
    
    document.getElementById('msgInput').addEventListener("keypress", (e) => { if(e.key === "Enter") send(); });
</script>

</body>
</html>
